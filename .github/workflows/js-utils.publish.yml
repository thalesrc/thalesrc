name: Js Utils / Publish

on:
  push:
    tags:
      - 'js-utils-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Set package version env variable
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#js-utils-v}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Test with Coverage
        run: pnpm nx run js-utils:test/coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage/libs/js-utils
          flags: js-utils
          name: js-utils-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Publish
        run: pnpm nx run js-utils:publish
